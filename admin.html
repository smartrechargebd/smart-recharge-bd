<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43);
color:white;
padding:20px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px 3px;
}

.addBtn{background:#00e676;}
.deleteBtn{background:red;color:white;}
.editBtn{background:orange;color:white;}
.saveBtn{background:#00c853;color:white;}
</style>
</head>

<body>

<h2>Admin Dashboard</h2>

<h3>Add / Update Package</h3>

<input type="hidden" id="editIndex">

<input id="title" placeholder="Title">
<input id="details" placeholder="Details">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<select id="badge">
<option value="">No Badge</option>
<option value="HOT">HOT</option>
<option value="OFFER">OFFER</option>
</select>

<button class="addBtn" onclick="saveProduct()">Save Package</button>

<hr>

<h3>All Packages</h3>
<div id="list"></div>

<script>

if(sessionStorage.getItem("role")!=="admin"){
window.location="index.html";
}

let products=JSON.parse(localStorage.getItem("products"))||[];

function display(){
let box=document.getElementById("list");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div style="background:#111;padding:15px;border-radius:10px;margin:10px 0;">
<b>${p.title}</b><br>
${p.details}<br>
৳${p.price}<br>
Badge: ${p.badge || "None"}<br>

<button class="editBtn" onclick="editProduct(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteProduct(${i})">Delete</button>
</div>
`;
});
}

function saveProduct(){
let title=document.getElementById("title").value;
let details=document.getElementById("details").value;
let price=document.getElementById("price").value;
let badge=document.getElementById("badge").value;
let image=document.getElementById("image").value;

let editIndex=document.getElementById("editIndex").value;

if(editIndex===""){
products.push({title,details,price,badge,image});
}else{
products[editIndex]={title,details,price,badge,image};
document.getElementById("editIndex").value="";
}

localStorage.setItem("products",JSON.stringify(products));
clearForm();
display();
}

function editProduct(i){
let p=products[i];

document.getElementById("title").value=p.title;
document.getElementById("details").value=p.details;
document.getElementById("price").value=p.price;
document.getElementById("badge").value=p.badge;
document.getElementById("image").value=p.image;
document.getElementById("editIndex").value=i;
}

function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
display();
}

function clearForm(){
document.getElementById("title").value="";
document.getElementById("details").value="";
document.getElementById("price").value="";
document.getElementById("badge").value="";
document.getElementById("image").value="";
}

display();

</script>

</body>
</html>
