<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
body{margin:0;font-family:Segoe UI;background:#0f2027;color:white;padding:20px;}
.card{background:#1b2b34;padding:15px;margin:10px 0;border-radius:8px;}
input,select{width:100%;padding:8px;margin:5px 0;border:none;border-radius:6px;}
button{padding:6px 12px;border:none;border-radius:6px;margin:5px 0;cursor:pointer;}
.add{background:#00e676;}
.delete{background:red;color:white;}
</style>
</head>
<body>

<h2>Admin Dashboard</h2>

<h3>Add Product</h3>
<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="details" placeholder="Details">
<select id="badge">
<option value="">No Badge</option>
<option value="HOT">HOT</option>
<option value="OFFER">OFFER</option>
</select>
<button class="add" onclick="addProduct()">Add</button>

<hr>

<h3>All Orders</h3>
<div id="orders"></div>

<hr>

<h3>Change Admin Password</h3>
<input id="newPass" placeholder="New Password">
<button onclick="changePass()">Update</button>

<script>
if(sessionStorage.getItem("role")!=="admin"){
window.location="index.html";
}

function addProduct(){
let products=JSON.parse(localStorage.getItem("products"))||[];
products.push({
title:document.getElementById("title").value,
price:document.getElementById("price").value,
details:document.getElementById("details").value,
badge:document.getElementById("badge").value
});
localStorage.setItem("products",JSON.stringify(products));
alert("Product Added!");
}

function changePass(){
let newPass=document.getElementById("newPass").value;
localStorage.setItem("adminPass",newPass);
alert("Password Updated!");
}

let orders=JSON.parse(localStorage.getItem("orders"))||[];
let box=document.getElementById("orders");
orders.forEach(o=>{
box.innerHTML+=`
<div class="card">
${o.name} bought ${o.product} (৳${o.price})<br>
TRX: ${o.trx}
</div>
`;
});
</script>

</body>
</html>
