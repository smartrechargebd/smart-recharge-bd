<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Smart Recharge BD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
}

body{
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
overflow:hidden;
}

.login-container{
width:100%;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:100%;
max-width:380px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:40px 25px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,150,0.25);
}

.logo{
font-size:22px;
font-weight:bold;
color:#00ff99;
margin-bottom:8px;
}

.subtitle{
opacity:.8;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin:10px 0;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00e676;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00c853;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.6;
}
</style>

</head>
<body>

<div class="login-container">
<div class="login-box">

<div class="logo">⚡ Smart Recharge BD</div>
<div class="subtitle">Secure Login</div>

<input type="text" id="loginInput" placeholder="Enter 11 digit mobile or admin password">
<button onclick="login()">Continue</button>

<div class="footer">Powered by SmartRecharge</div>

</div>
</div>

<script>
function login(){
const input=document.getElementById("loginInput").value.trim();

if(input==="admin@2026@"){
sessionStorage.setItem("role","admin");
window.location="admin.html";
return;
}

if(input.length===11 && !isNaN(input)){
sessionStorage.setItem("role","user");
sessionStorage.setItem("user",input);
window.location="home.html";
return;
}

alert("Invalid Login");
}
</script>

</body>
</html>
