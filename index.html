<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Smart Recharge BD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
background:#0f2027;
overflow:hidden;
}

body{
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
min-height:100dvh;
color:white;
position:relative;
}

/* Floating particles */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%, rgba(0,255,150,.15), transparent 40%),
radial-gradient(circle at 70% 70%, rgba(0,200,255,.15), transparent 40%);
animation:moveBg 12s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
50%{transform:translate(-50px,-50px);}
100%{transform:translate(0,0);}
}

.login-box{
width:100%;
max-width:380px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border-radius:20px;
padding:40px 25px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,150,.3);
animation:fadeIn .8s ease;
position:relative;
z-index:2;
}

/* Glow border */
.login-box::after{
content:"";
position:absolute;
inset:0;
border-radius:20px;
padding:2px;
background:linear-gradient(45deg,#00ff99,#00c853,#00ff99);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
animation:borderGlow 3s linear infinite;
}

@keyframes borderGlow{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.logo-img{
width:90px;
margin-bottom:12px;
animation:fadeIn 1s ease;
}

.logo-text{
font-size:22px;
font-weight:bold;
color:#00ff99;
margin-bottom:8px;
}

.subtitle{
opacity:.8;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin:10px 0;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00e676;
color:black;
font-weight:bold;
font-size:16px;
cursor:pointer;
position:relative;
overflow:hidden;
transition:.3s;
}

button:hover{
background:#00c853;
}

/* Ripple effect */
button::after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,.4);
border-radius:50%;
transform:translate(-50%,-50%);
opacity:0;
}

button:active::after{
width:200px;
height:200px;
opacity:1;
transition:0s;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.6;
}
</style>

</head>
<body>

<div class="login-box">

<img src="https://i.postimg.cc/Qxr6kM5f/8E06F917-7C4C-42E5-B43F-B792C3410617.png" class="logo-img">

<div class="logo-text">Smart Recharge BD</div>
<div class="subtitle">Secure Login</div>

<input type="password" id="number" placeholder="Enter 11 digit number or admin password">
<button onclick="login()">Continue</button>

<div class="footer">Powered by SmartRecharge</div>

</div>

<script>
let defaultPass="admin@2026@";

if(!localStorage.getItem("adminPass")){
localStorage.setItem("adminPass",defaultPass);
}

function login(){
let input=document.getElementById("number").value.trim();
let savedPass=localStorage.getItem("adminPass");

if(input===savedPass){
sessionStorage.setItem("role","admin");
window.location="admin.html";
return;
}

if(/^\d{11}$/.test(input)){
sessionStorage.setItem("role","user");
sessionStorage.setItem("user",input);
window.location="home.html";
return;
}

alert("Invalid Login");
}
</script>

</body>
</html>
