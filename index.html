<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Smart Recharge BD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
}

body{
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#0f2027,#1a2a33,#16222a);
display:flex;
justify-content:center;
align-items:center;
min-height:100dvh;
color:white;
}

/* Background glow */
body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#00e67655,transparent);
top:-100px;
left:-100px;
z-index:0;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#00e67633,transparent);
bottom:-100px;
right:-100px;
z-index:0;
}

.wrapper{
width:100%;
padding:20px;
position:relative;
z-index:1;
}

.login-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:40px 25px;
border-radius:20px;
width:100%;
max-width:380px;
margin:auto;
text-align:center;
box-shadow:0 0 40px rgba(0,255,150,.3);
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
letter-spacing:1px;
color:#00e676;
}

.subtitle{
margin-bottom:20px;
opacity:.8;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00e676;
color:black;
font-weight:bold;
cursor:pointer;
font-size:16px;
transition:.3s;
}

button:hover{
background:#00c853;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.6;
}
</style>

</head>
<body>

<div class="wrapper">
<div class="login-box">

<div class="logo">⚡ Smart Recharge BD</div>
<div class="subtitle">Secure Login</div>

<input type="text" id="loginInput" placeholder="Enter 11 digit mobile or admin password">
<button onclick="login()">Continue</button>

<div class="footer">Powered by SmartRecharge</div>

</div>
</div>

<script>
function login(){
const input=document.getElementById("loginInput").value.trim();

if(input==="admin@2026@"){
sessionStorage.setItem("role","admin");
window.location="admin.html";
return;
}

if(input.length===11 && !isNaN(input)){
sessionStorage.setItem("role","user");
sessionStorage.setItem("user",input);
window.location="home.html";
return;
}

alert("Invalid Login");
}
</script>

</body>
</html>
