<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recharge BD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:35px;
border-radius:15px;
width:90%;
max-width:360px;
box-shadow:0 0 30px rgba(0,255,150,0.25);
}

h2{
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00e676;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00c853;
}
</style>
</head>

<body>

<div class="login-box">
<h2>⚡ Smart Recharge BD</h2>
<div class="subtitle">Secure Login</div>

<input type="password" id="number" placeholder="Enter 11 digit number or admin password">
<button onclick="login()">Continue</button>
</div>

<script>

// Default admin password
let defaultPass = "admin@2026@";

// First time open হলে default password set হবে
if(!localStorage.getItem("adminPass")){
localStorage.setItem("adminPass", defaultPass);
}

function login(){

let input = document.getElementById("number").value.trim();
let savedPass = localStorage.getItem("adminPass");

// Admin Login
if(input === savedPass){
sessionStorage.setItem("role","admin");
window.location="admin.html";
return;
}

// User Login (11 digit only)
if(/^\d{11}$/.test(input)){
sessionStorage.setItem("role","user");
sessionStorage.setItem("user",input);
window.location="home.html";
return;
}

alert("Invalid Login");
}

</script>

</body>
</html>
