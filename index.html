<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recharge BD</title>
<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f2027;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#1b2b34;
padding:40px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00e676;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>⚡ Smart Recharge BD</h2>
<input type="text" id="loginInput" placeholder="Enter 11 digit number or admin password">
<button onclick="login()">Login</button>
</div>

<script>
function login(){
let input=document.getElementById("loginInput").value.trim();
let adminPass=localStorage.getItem("adminPass")||"admin@2026@";

if(input===adminPass){
sessionStorage.setItem("role","admin");
window.location="admin.html";
return;
}

if(input.length===11 && !isNaN(input)){
sessionStorage.setItem("role","user");
sessionStorage.setItem("user",input);
window.location="home.html";
return;
}

alert("Invalid Login");
}
</script>

</body>
</html>
