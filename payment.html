<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Payment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html{
height:100%;
background:#0f2027;
}

body{
min-height:100%;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
font-family:Segoe UI;
color:white;
padding:40px 20px env(safe-area-inset-bottom);
}

/* Wrapper */
.wrapper{
max-width:420px;
margin:auto;
}

/* Card */
.card{
background:rgba(0,0,0,0.45);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,255,150,.25);
}

/* Logo */
.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.logo img{
width:42px;
}

/* Price */
.price{
color:#00ff99;
font-size:20px;
font-weight:bold;
margin-top:8px;
}

/* Inputs */
input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:rgba(0,0,0,0.75);
color:white;
font-size:15px;
outline:none;
}

input::placeholder{
color:rgba(255,255,255,.5);
}

/* Buttons */
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
margin-top:16px;
font-size:15px;
}

.confirm{
background:linear-gradient(45deg,#00e676,#00c853);
color:black;
}

.back{
background:linear-gradient(45deg,#ff1744,#d50000);
color:white;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="card">

<div class="logo">
<img src="https://i.postimg.cc/Qxr6kM5f/8E06F917-7C4C-42E5-B43F-B792C3410617.png">
<h3>Smart Recharge BD</h3>
</div>

<div id="productInfo"></div>

<p style="margin-top:15px;"><b>bKash / Nagad:</b> 01861316505</p>

<input id="name" placeholder="Your Name">
<input id="trx" placeholder="Transaction ID">
<input id="coupon" placeholder="Coupon Code (Optional)">

<button class="confirm" onclick="confirmOrder()">Confirm Payment</button>
<button class="back" onclick="goBack()">Back</button>

</div>
</div>

<script>
if(sessionStorage.getItem("role")!=="user"){
window.location="index.html";
}

let products=JSON.parse(localStorage.getItem("products"))||[];
let index=localStorage.getItem("selectedIndex");

if(index===null){
window.location="home.html";
}

let product=products[index];
let basePrice=parseInt(product.price);

document.getElementById("productInfo").innerHTML=
"<h3>"+product.title+"</h3>"+
"<p>"+product.details+"</p>"+
"<p class='price'>৳"+basePrice+"</p>";

function confirmOrder(){

let name=document.getElementById("name").value.trim();
let trx=document.getElementById("trx").value.trim();
let user=sessionStorage.getItem("user");
let coupon=document.getElementById("coupon").value.trim();

if(!name || !trx){
alert("Fill all fields");
return;
}

let discount=0;
if(coupon==="SR50"){
discount=5;
}

let finalAmount=basePrice-discount;

let orders=JSON.parse(localStorage.getItem("orders"))||[];

orders.push({
name:name,
user:user,
product:product.title,
price:finalAmount,
trx:trx,
coupon:coupon || "None"
});

localStorage.setItem("orders",JSON.stringify(orders));

let message="Name: "+name+
"%0ANumber: "+user+
"%0AProduct: "+product.title+
"%0AFinal Price: "+finalAmount+
"%0ATRX: "+trx+
"%0ACoupon: "+(coupon||"None");

window.open("https://wa.me/8801607254046?text="+message,"_blank");

window.location="home.html";
}

function goBack(){
window.location="home.html";
}
</script>

</body>
</html>
