<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Payment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
background:#0f2027;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
min-height:100vh;
min-height:100dvh;
color:white;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

/* Floating light animation */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 30% 30%, rgba(0,255,150,.15), transparent 40%),
radial-gradient(circle at 70% 70%, rgba(0,200,255,.15), transparent 40%);
animation:moveBg 12s linear infinite;
z-index:0;
pointer-events:none;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
50%{transform:translate(-50px,-50px);}
100%{transform:translate(0,0);}
}

.wrapper{
width:100%;
max-width:420px;
position:relative;
z-index:2;
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.logo-img{
width:40px;
}

.glass-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,150,.3);
animation:fadeIn .8s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.price{
color:#00ff99;
font-size:20px;
font-weight:bold;
margin-top:8px;
}

label{
font-size:14px;
opacity:.8;
margin-top:12px;
display:block;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
transition:.3s;
}

.confirm{
background:#00e676;
color:black;
}

.confirm:hover{
background:#00c853;
}

.back{
background:#ff1744;
color:white;
}

.back:hover{
background:#d50000;
}

.bkash{
margin-top:15px;
font-size:14px;
opacity:.9;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<img src="https://i.postimg.cc/Qxr6kM5f/8E06F917-7C4C-42E5-B43F-B792C3410617.png" class="logo-img">
<h2>Smart Recharge BD</h2>
</div>

<div class="glass-card">

<div id="productInfo"></div>

<div class="bkash">
<b>bKash / Nagad:</b> 01861316505
</div>

<label>Your Name</label>
<input id="name" placeholder="Enter your name">

<label>Transaction ID</label>
<input id="trx" placeholder="Enter transaction ID">

<button class="confirm" onclick="confirmOrder()">Confirm Payment</button>
<button class="back" onclick="goBack()">Back</button>

</div>
</div>

<script>
if(sessionStorage.getItem("role")!=="user"){
window.location="index.html";
}

let products=JSON.parse(localStorage.getItem("products"))||[];
let index=localStorage.getItem("selectedIndex");

if(index===null){
window.location="home.html";
}

let product=products[index];

document.getElementById("productInfo").innerHTML=
"<h3>"+product.title+"</h3>"+
"<p>"+product.details+"</p>"+
"<p class='price'>৳"+product.price+"</p>";

function confirmOrder(){
let name=document.getElementById("name").value;
let trx=document.getElementById("trx").value;
let user=sessionStorage.getItem("user");

if(!name||!trx){
alert("Fill all fields");
return;
}

let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push({name,user,product:product.title,price:product.price,trx});
localStorage.setItem("orders",JSON.stringify(orders));

let msg="Name: "+name+
"%0ANumber: "+user+
"%0AProduct: "+product.title+
"%0APrice: "+product.price+
"%0ATRX: "+trx;

window.open("https://wa.me/8801607254046?text="+msg);

alert("Order Successful!");
window.location="home.html";
}

function goBack(){
window.location="home.html";
}
</script>

</body>
</html>
