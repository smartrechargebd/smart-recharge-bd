<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Home</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
min-height:100vh;
min-height:100dvh;
color:white;
padding:20px;
}

/* Top bar */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
font-size:14px;
opacity:.9;
}

.logo-wrap{
display:flex;
align-items:center;
gap:10px;
}

.logo-img{width:40px;}

.logout{
background:#ff1744;
border:none;
padding:6px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* Rating */
.rating{
margin-bottom:20px;
font-size:14px;
opacity:.9;
}

/* Grid */
.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.07);
border-radius:18px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,255,150,.2);
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 35px rgba(0,255,150,.4);
}

.product-img{
width:100%;
height:160px;
object-fit:cover;
}

.content{padding:18px;}

.badge{
position:absolute;
top:12px;
right:12px;
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.hot{background:#ff1744;}
.offer{background:#ff9100;}

.price{
color:#00ff99;
font-weight:bold;
margin-top:8px;
}

.buy{
margin-top:12px;
background:#00e676;
border:none;
padding:10px;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
}

/* Live popup */
.live-popup{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,.8);
padding:12px 15px;
border-radius:12px;
font-size:13px;
display:none;
z-index:99;
}
</style>
</head>

<body>

<div class="top-bar">
<div class="logo-wrap">
<img src="https://i.postimg.cc/Qxr6kM5f/8E06F917-7C4C-42E5-B43F-B792C3410617.png" class="logo-img">
<b>Smart Recharge BD</b>
</div>
<div>
Orders: <span id="orderCount">0</span>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

<div class="rating">
⭐ 4.8 / 5 (2,349 Reviews)
</div>

<div class="product-grid" id="productList"></div>

<div class="live-popup" id="livePopup"></div>

<script>
if(sessionStorage.getItem("role")!=="user"){
window.location="index.html";
}

let products=JSON.parse(localStorage.getItem("products"))||[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];

document.getElementById("orderCount").innerText=orders.length;

function display(){
let box=document.getElementById("productList");
box.innerHTML="";
products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
${p.badge?`<span class="badge ${p.badge.toLowerCase()}">${p.badge}</span>`:""}
<img src="${p.image || 'https://via.placeholder.com/400x200'}" class="product-img">
<div class="content">
<h3>${p.title}</h3>
<p>${p.details}</p>
<p class="price">৳${p.price}</p>
<button class="buy" onclick="buy(${i})">Buy Now</button>
</div>
</div>
`;
});
}

function buy(i){
localStorage.setItem("selectedIndex",i);
window.location="payment.html";
}

function logout(){
sessionStorage.clear();
window.location="index.html";
}

/* Fake live purchase popup */
let names=["Rahim","Karim","Hasan","Jamal","Sabbir"];
function showPopup(){
let popup=document.getElementById("livePopup");
let randomName=names[Math.floor(Math.random()*names.length)];
let randomProduct=products[Math.floor(Math.random()*products.length)];
popup.innerText=randomName+" just bought "+randomProduct.title;
popup.style.display="block";
setTimeout(()=>{popup.style.display="none";},4000);
}
setInterval(showPopup,10000);

display();
</script>

</body>
</html>
