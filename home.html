<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Home</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
background:#0f2027;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
min-height:100vh;
min-height:100dvh;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logout{
background:#ff1744;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.07);
backdrop-filter:blur(12px);
border-radius:20px;
margin:20px 0;
overflow:hidden;
box-shadow:0 0 25px rgba(0,255,150,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 35px rgba(0,255,150,.4);
}

.product-img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:20px;
}

.badge{
position:absolute;
top:15px;
right:15px;
padding:5px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.hot{background:#ff1744;}
.offer{background:#ff9100;}

.price{
color:#00ff99;
font-weight:bold;
font-size:18px;
margin-top:10px;
}

.buy{
margin-top:15px;
background:#00e676;
border:none;
padding:10px;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>⚡ Smart Recharge BD</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div id="productList"></div>

<script>
if(sessionStorage.getItem("role")!=="user"){
window.location="index.html";
}

let products=JSON.parse(localStorage.getItem("products"))||[];

function display(){
let box=document.getElementById("productList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card" style="position:relative;">
${p.badge?`<span class="badge ${p.badge.toLowerCase()}">${p.badge}</span>`:""}
<img src="${p.image || 'https://via.placeholder.com/400x200'}" class="product-img">
<div class="content">
<h3>${p.title}</h3>
<p>${p.details}</p>
<p class="price">৳${p.price}</p>
<button class="buy" onclick="buy(${i})">Buy Now</button>
</div>
</div>
`;
});
}

function buy(i){
localStorage.setItem("selectedIndex",i);
window.location="payment.html";
}

function logout(){
sessionStorage.clear();
window.location="index.html";
}

display();
</script>

</body>
</html>
