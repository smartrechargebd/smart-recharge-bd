<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recharge BD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
color:white;
min-height:100vh;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-weight:bold;
font-size:18px;
color:#00ff99;
}

.logout{
background:red;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
margin:25px 0;
border-radius:15px;
box-shadow:0 0 25px rgba(0,255,150,0.15);
overflow:hidden;
position:relative;
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 0 35px rgba(0,255,150,0.3);
}

.product-img{
width:100%;
height:160px;
object-fit:cover;
display:block;
}

.card-content{
padding:20px;
}

.badge{
position:absolute;
top:15px;
right:15px;   /* 🔥 এখন ডানে থাকবে */
padding:5px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
z-index:2;
}

.hot{background:#ff1744;}
.offer{background:#ff9100;}

.price{
color:#00ff99;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.buy{
margin-top:15px;
background:#00e676;
border:none;
padding:10px;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.buy:hover{
background:#00c853;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">⚡ Smart Recharge BD</div>
<button class="logout" onclick="logout()">Logout</button>
</div>

<h3>Available Packages</h3>
<div id="productList"></div>

<script>
if(sessionStorage.getItem("role")!=="user"){
window.location="index.html";
}

let products=JSON.parse(localStorage.getItem("products"))||[
{
title:"30 Taka Card",
price:28,
details:"30 Minutes - 3 Days",
badge:"HOT",
image:"https://images.unsplash.com/photo-1580910051074-3eb694886505"
},
{
title:"50 Taka Card",
price:48,
details:"50 Minutes - 5 Days",
badge:"",
image:"https://images.unsplash.com/photo-1580910051074-3eb694886505"
},
{
title:"100 Taka Card",
price:95,
details:"100 Minutes - 7 Days",
badge:"OFFER",
image:"https://images.unsplash.com/photo-1580910051074-3eb694886505"
}
];

localStorage.setItem("products",JSON.stringify(products));

function display(){
let box=document.getElementById("productList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">

${p.badge?`<span class="badge ${p.badge.toLowerCase()}">${p.badge}</span>`:""}

<img src="${p.image}" class="product-img">

<div class="card-content">
<h4>${p.title}</h4>
<p>${p.details}</p>
<p class="price">৳${p.price}</p>
<button class="buy" onclick="buy(${i})">Buy Now</button>
</div>

</div>
`;
});
}

function buy(i){
localStorage.setItem("selectedIndex",i);
window.location="payment.html";
}

function logout(){
sessionStorage.clear();
window.location="index.html";
}

display();
</script>

</body>
</html>
